##### THEME: cyberdream-dark (custom) #####

# ---- Base ----
set -g @bg "#16181a"
set -g @fg "#ffffff"

# ---- Accents ----
set -g @accent "#5eff6c"
set -g @accent-alt "#5eff6c" # green (secondary / success)
set -g @warn "#ffbd5e"
set -g @error "#ff6e5e"

# ---- Muted / surfaces ----
set -g @muted "#7b8496"
set -g @surface "#1e2124"
set -g @overlay "#3c4048"


##### STATUS BAR #####

set -g status on
set -g status-position bottom
set -g status-interval 5

set -g status-style "bg=#{@bg},fg=#{@muted}"

# ---- Left: session name ----
set -g status-left-length 40
set -g status-left "#[fg=#{@accent}] #S #[fg=#{@overlay}]▸ "

# ---- Right: intentionally empty ----
set -g status-right ""
set -g status-right-length 0


##### WINDOW LIST (TABS) #####

# Inactive windows
setw -g window-status-format " #I:#W "
setw -g window-status-style "fg=#{@muted},bg=#{@bg}"

# Active window
setw -g window-status-current-format " #[fg=#{@fg}]#I:#W "
setw -g window-status-current-style "fg=#{@fg},bg=#{@bg}"

set -g window-status-separator ""


##### MESSAGES & PROMPTS #####

set -g message-style "bg=#{@surface},fg=#{@fg}"
set -g message-command-style "bg=#{@surface},fg=#{@accent}"


##### COPY MODE #####

setw -g mode-style "bg=#{@accent},fg=#{@bg}"


##### PANE BORDERS (effectively hidden) #####

set -g pane-border-style "fg=#{@bg}"
set -g pane-active-border-style "fg=#{@bg}"


##### BELLS / VISUAL NOISE #####

set -g visual-bell off
set -g bell-action none
