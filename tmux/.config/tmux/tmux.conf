##### BASICS #####

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -g mouse on

##### PREFIX #####

# Use Ctrl-a as prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix


##### GENERAL BEHAVIOR #####

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows on close
set -g renumber-windows on

# Don’t rename windows automatically
setw -g automatic-rename off

##### WINDOWS (TABS) #####

# Create new window
bind c new-window

# Kill current window (with confirmation)
bind & confirm-before -p "kill window #W? (y/n)" kill-window

##### COPY MODE (VI) #####

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel


##### SESSION UX #####

# Detach safely
bind d detach
# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

##### DEFAULT LAYOUT (TAB-ONLY WORKFLOW) #####

# Optional: bootstrap windows when creating a new session manually
# Run once per session if you want structure:
#
# tmux new-session -s dev \
#   -n nvim \; \
#   new-window -n test \; \
#   new-window -n git \; \
#   new-window -n notes \; \
#   select-window -t nvim

##### THEME: cyberdream-dark (custom) #####

# source-file ~/.config/tmux/theme.conf
source-file ~/.config/tmux/kanagawa_wave.conf

##### PLUGINS #####

set -g @plugin 'tmux-plugins/tpm'
run '~/.config/tmux/plugins/tpm/tpm'
