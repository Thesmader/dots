##### Kanagawa Wave — tmux theme #####
##### Author: you, guided by good taste #####

### Base colors
set -g @kanagawa_bg        "#1f1f28"  # sumiInk0
set -g @kanagawa_bg_alt    "#2a2a37"  # sumiInk2
set -g @kanagawa_fg        "#dcd7ba"  # fujiWhite
set -g @kanagawa_fg_dim    "#727169"  # fujiGray

### Accents
set -g @kanagawa_blue      "#7e9cd8"  # crystalBlue
set -g @kanagawa_cyan      "#7fb4ca"  # waveAqua1
set -g @kanagawa_green     "#98bb6c"  # springGreen
set -g @kanagawa_yellow    "#e6c384"  # carpYellow
set -g @kanagawa_orange    "#ffa066"  # surimiOrange
set -g @kanagawa_red       "#e46876"  # waveRed
set -g @kanagawa_purple    "#957fb8"  # oniViolet

### Status bar
set -g status-style "bg=#{@kanagawa_bg},fg=#{@kanagawa_fg}"
set -g status-position bottom
set -g status-interval 5

### Left: session
set -g status-left-length 40
set -g status-left "#[fg=#{@kanagawa_blue},bg=#{@kanagawa_bg}]  #S "

### Windows
setw -g window-status-style "fg=#{@kanagawa_fg_dim},bg=#{@kanagawa_bg}"
setw -g window-status-current-style "fg=#{@kanagawa_bg},bg=#{@kanagawa_blue},bold"

setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "

### Right: clock + host
set -g status-right-length 100
set -g status-right "#[fg=#{@kanagawa_fg_dim}] %H:%M #[fg=#{@kanagawa_cyan}]#H "

### Panes
set -g pane-border-style "fg=#{@kanagawa_bg_alt}"
set -g pane-active-border-style "fg=#{@kanagawa_blue}"

### Messages
set -g message-style "bg=#{@kanagawa_bg_alt},fg=#{@kanagawa_fg}"
set -g message-command-style "bg=#{@kanagawa_bg_alt},fg=#{@kanagawa_yellow}"

### Copy mode
setw -g mode-style "bg=#{@kanagawa_blue},fg=#{@kanagawa_bg}"

### Bell / alerts (subtle)
set -g window-status-bell-style "fg=#{@kanagawa_red},bg=#{@kanagawa_bg}"

### Clock mode
# NOTE: tmux does NOT allow format expansion here
setw -g clock-mode-colour "#7e9cd8"

##### End Kanagawa Wave #####

